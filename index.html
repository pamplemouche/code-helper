<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pamplemouche Engine - Collab Mode</title>
    <style>
        body { background: #050505; color: #ff8c00; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 0; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 900px; height: 100vh; display: flex; flex-direction: column; border-left: 1px solid #222; border-right: 1px solid #222; }
        
        /* Header */
        .header { padding: 15px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; background: #0a0a0a; }
        h1 { font-size: 1.1em; margin: 0; color: #fff; text-transform: uppercase; letter-spacing: 1px; }

        /* Chat Zone */
        #chat-zone { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #050505; }
        
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 15px; position: relative; }
        .user { align-self: flex-end; background: #ff8c00; color: #000; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: #1a1a1a; color: #ccc; border-bottom-left-radius: 2px; border: 1px solid #333; }
        
        .code-tag { display: inline-block; background: #00ffcc; color: #000; font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 4px; margin-bottom: 8px; text-transform: uppercase; }
        .code-block { background: #000; color: #0f0; font-family: 'Consolas', monospace; font-size: 13px; padding: 10px; border-radius: 5px; margin-top: 10px; overflow-x: auto; border: 1px solid #222; }

        /* Input Zone */
        .input-area { padding: 20px; background: #0a0a0a; border-top: 1px solid #222; }
        .input-wrapper { display: flex; gap: 10px; background: #161616; padding: 10px; border-radius: 10px; border: 1px solid #333; }
        textarea { flex: 1; background: transparent; border: none; color: #fff; resize: none; outline: none; font-size: 16px; height: 45px; }
        button { background: #ff8c00; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { opacity: 0.8; }
        button:disabled { background: #444; }

        /* Status Bar */
        #status-bar { font-size: 11px; color: #666; padding: 5px 20px; background: #000; border-top: 1px solid #111; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍊 Pamplemouche Engine</h1>
            <span id="loader" style="display:none; color:#00ffcc; font-size:12px;">IA réfléchit...</span>
        </div>
        
        <div id="chat-zone">
            <div class="msg ai">Salut ! Je suis ton binôme. Dis-moi ce qu'on code, ou discutons des prochaines étapes de ton OS.</div>
        </div>

        <div id="status-bar">Connecté à GitHub : Prêt</div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="user-input" placeholder="Discute avec l'IA ou demande du code..."></textarea>
                <button id="send-btn" onclick="sendMessage()">ENVOYER</button>
            </div>
        </div>
    </div>

    <script>
        let history = [];
        const chatZone = document.getElementById('chat-zone');
        const input = document.getElementById('user-input');
        const loader = document.getElementById('loader');

        function addMessage(role, content, isCode = false, repo = "", path = "") {
            const div = document.createElement('div');
            div.className = `msg ${role === 'user' ? 'user' : 'ai'}`;
            
            let html = `<div>${content}</div>`;
            if (isCode) {
                html = `<span class="code-tag">Auto-Push: ${path}</span>` + html;
            }
            
            div.innerHTML = html;
            chatZone.appendChild(div);
            chatZone.scrollTop = chatZone.scrollHeight;
        }

        async function sendMessage() {
            const prompt = input.value.trim();
            if (!prompt) return;

            addMessage('user', prompt);
            input.value = '';
            loader.style.display = 'block';
            document.getElementById('send-btn').disabled = true;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, history })
                });

                const data = await response.json();
                
                // On met à jour l'historique de discussion
                history.push({ role: "user", parts: [{ text: prompt }] });
                history.push(data.fullResponse);

                // Affichage de la réponse texte
                addMessage('ai', data.explanation, data.code ? true : false, data.repo, data.path);

                // Si l'IA a généré du code, on l'envoie à GitHub en silence
                if (data.code && data.path) {
                    const gitRes = await fetch('/api/github', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            repo: data.repo,
                            path: data.path,
                            content: data.code,
                            message: `Collab: ${data.explanation}`,
                            createRepo: data.createRepo || false
                        })
                    });
                    
                    if (gitRes.ok) {
                        document.getElementById('status-bar').innerText = `Dernier push : ${data.path} sur ${data.repo}`;
                    }
                }

            } catch (err) {
                addMessage('ai', "Désolé, j'ai eu un petit bug. On réessaie ?");
                console.error(err);
            } finally {
                loader.style.display = 'none';
                document.getElementById('send-btn').disabled = false;
            }
        }

        // Enter pour envoyer
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
