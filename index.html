<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pamplemouche Engine v2.1</title>
    <style>
        body { background: #050505; color: #ff8c00; font-family: 'Courier New', monospace; padding: 20px; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; display: flex; flex-direction: column; height: 95vh; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ff8c00; padding-bottom: 10px; }
        h1 { color: #fff; margin: 0; font-size: 1.2em; text-transform: uppercase; }
        
        #terminal { 
            flex-grow: 1; background: #000; border: 1px solid #333; 
            overflow-y: auto; padding: 15px; margin: 20px 0; 
            border-radius: 5px; font-size: 14px;
        }

        .input-box { display: flex; gap: 10px; background: #111; padding: 10px; border-radius: 8px; border: 1px solid #333; }
        textarea { 
            flex: 1; background: transparent; border: none; color: #fff; 
            font-size: 16px; resize: none; outline: none; height: 50px;
        }
        
        .btns { display: flex; flex-direction: column; gap: 5px; }
        button { 
            background: #ff8c00; border: none; padding: 10px 20px; 
            font-weight: bold; cursor: pointer; border-radius: 4px; color: #000;
        }
        .btn-reset { background: #333; color: #888; font-size: 0.8em; }

        .log-user { color: #555; margin-top: 10px; }
        .log-ai { color: #00ffcc; background: rgba(0,255,204,0.05); padding: 10px; border-left: 3px solid #00ffcc; margin: 10px 0; }
        .log-error { color: #ff4444; background: rgba(255,68,68,0.1); padding: 10px; border-left: 3px solid #ff4444; }
        .code-preview { background: #0a0a0a; color: #0f0; padding: 10px; font-size: 0.8em; border: 1px solid #1a1a1a; margin-top: 5px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍊 Pamplemouche Engine v2.1</h1>
            <button class="btn-reset" onclick="resetHistory()">Reset Memory</button>
        </div>
        
        <div id="terminal">
            <div style="color:#666">[System] Prêt pour déploiement universel.</div>
        </div>

        <div class="input-box">
            <textarea id="prompt" placeholder="Action... (ex: Modifie le readme de code-helper)"></textarea>
            <div class="btns">
                <button id="pushBtn" onclick="run()">PUSH</button>
            </div>
        </div>
    </div>

    <script>
        let conversationHistory = [];
        const term = document.getElementById('terminal');
        const promptInput = document.getElementById('prompt');

        function log(msg, type='sys') {
            const div = document.createElement('div');
            div.className = 'log-' + type;
            div.innerHTML = msg;
            term.appendChild(div);
            term.scrollTop = term.scrollHeight;
        }

        function resetHistory() {
            conversationHistory = [];
            term.innerHTML = '<div style="color:#666">[System] Mémoire effacée.</div>';
        }

        async function run() {
            const userPrompt = promptInput.value.trim();
            if(!userPrompt) return;

            const btn = document.getElementById('pushBtn');
            btn.disabled = true;

            log(`> ${userPrompt}`, 'user');
            promptInput.value = '';

            try {
                // 1. API CHAT
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ prompt: userPrompt, history: conversationHistory })
                });
                
                const data = await res.json();
                
                if (data.error) throw new Error(data.error);
                if (!data.repo || !data.path) throw new Error("Réponse IA incomplète.");

                // On simplifie ce qu'on garde en mémoire pour éviter de saturer Gemini
                conversationHistory.push({ role: "user", parts: [{ text: userPrompt }] });
                conversationHistory.push({ role: "model", parts: [{ text: JSON.stringify({repo: data.repo, path: data.path, explanation: data.explanation}) }] });

                log(`<b>IA (${data.repo})</b>: ${data.explanation}`, 'ai');
                
                // 2. API GITHUB
                log(`🚀 Push vers GitHub...`, 'sys');
                const gitRes = await fetch('/api/github', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        repo: data.repo, 
                        path: data.path, 
                        content: data.code, 
                        message: data.explanation,
                        createRepo: data.createRepo || false
                    })
                });

                if (gitRes.ok) {
                    log(`✅ Déployé : ${data.path}`, 'sys');
                } else {
                    const errGit = await gitRes.json();
                    log(`❌ Erreur GitHub : ${errGit.error}`, 'error');
                }

            } catch(e) { 
                log(`❌ ERREUR : ${e.message}`, 'error'); 
                console.error(e);
            } finally {
                btn.disabled = false;
                term.scrollTop = term.scrollHeight;
            }
        }
    </script>
</body>
</html>
