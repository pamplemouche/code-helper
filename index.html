<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Pamplemouche OS Master Control</title>
    <style>
        body { background: #050505; color: #ff8c00; font-family: 'monospace'; padding: 20px; }
        #terminal { background: #000; border: 1px solid #ff8c00; height: 70vh; overflow-y: auto; padding: 15px; margin-bottom: 20px; border-radius: 5px; box-shadow: 0 0 20px rgba(255,140,0,0.2); }
        .input-box { display: flex; gap: 10px; }
        textarea { flex: 1; background: #111; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 5px; font-size: 1.1em; }
        button { background: #ff8c00; border: none; padding: 0 30px; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .log-ai { color: #00ffcc; margin: 10px 0; border-left: 2px solid #00ffcc; padding-left: 10px; }
        .log-sys { color: #888; font-size: 0.8em; }
        .code-preview { background: #0a0a0a; color: #0f0; padding: 10px; font-size: 0.8em; border: 1px solid #1a1a1a; max-height: 150px; overflow: hidden; }
    </style>
</head>
<body>
    <h1>🍊 PAMPLEMOUCHE ENGINE</h1>
    <div id="terminal"></div>
    <div class="input-box">
        <textarea id="prompt" placeholder="Commande (ex: Crée une VM Web avec VFS dans le repo X...)"></textarea>
        <button onclick="run()">PUSH</button>
    </div>

    <script>
        let history = [];
        const term = document.getElementById('terminal');

        function log(msg, type='sys') {
            const div = document.createElement('div');
            div.className = 'log-' + type;
            div.innerHTML = msg;
            term.appendChild(div);
            term.scrollTop = term.scrollHeight;
        }

        async function run() {
            const prompt = document.getElementById('prompt').value;
            if(!prompt) return;
            document.getElementById('prompt').value = '';
            
            log(`> EXECUTING: ${prompt}`, 'sys');

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ prompt, history })
                });
                const data = await res.json();
                history.push(data.fullResponse);

                log(`IA: ${data.explanation} <br> <div class="code-preview">${data.code.substring(0,200)}...</div>`, 'ai');

                const git = await fetch('/api/github', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ repo: data.repo, path: data.path, content: data.code, message: data.explanation })
                });

                if(git.ok) log(`✅ DEPLOYED TO ${data.repo}/${data.path}`, 'sys');
                else log(`❌ GITHUB ERROR`, 'sys');

            } catch(e) { log(`❌ CRASH: ${e.message}`, 'sys'); }
        }
    </script>
</body>
</html>
