<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Pamplemouche Dev Control</title>
    <style>
        body { background: #0a0a0a; color: #ff8c00; font-family: 'Courier New', monospace; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { border-bottom: 2px solid #ff8c00; padding-bottom: 10px; }
        textarea { 
            width: 100%; height: 150px; 
            background: #1a1a1a; color: #fff; 
            border: 1px solid #ff8c00; padding: 10px;
            margin-bottom: 10px; border-radius: 5px;
        }
        button { 
            background: #ff8c00; color: #000; 
            border: none; padding: 10px 20px; 
            font-weight: bold; cursor: pointer; border-radius: 5px;
        }
        button:hover { background: #ffa500; }
        #console { 
            margin-top: 20px; background: #000; 
            padding: 15px; border: 1px dashed #555;
            min-height: 200px; white-space: pre-wrap;
        }
        .status { color: #555; font-size: 0.8em; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍊 PAMPLEMOUCHE CLAUDE CODE</h1>
        
        <label>Instruction pour l'IA :</label>
        <textarea id="prompt" placeholder="Ex: Crée un dossier /apps/music et ajoute un fichier player.js..."></textarea>
        
        <button onclick="askClaude()">EXÉCUTER LE PATCH</button>
        
        <div id="console">Système prêt. En attente d'instructions...</div>
        <div class="status">Connecté au Proxy Vercel via /api/chat</div>
    </div>

    <script>
        async function askClaude() {
            const prompt = document.getElementById('prompt').value;
            const log = document.getElementById('console');
            
            log.innerHTML += `\n[${new Date().toLocaleTimeString()}] Envoi à Claude...`;
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt, context: "Architecture Pamplemouche OS v1" })
                });
                
                const data = await response.json();
                log.innerHTML += `\n[OK] Réponse reçue. Application sur GitHub...`;
                
                // On appellera le commit ici à l'étape suivante
                console.log(data.completion);
                
            } catch (err) {
                log.innerHTML += `\n[ERREUR] ${err.message}`;
            }
        }
    </script>
</body>
</html>
