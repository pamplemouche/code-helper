<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pamplemouche Engine - Debug Mode</title>
    <style>
        body { background: #050505; color: #ff8c00; font-family: monospace; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; height: 90vh; display: flex; flex-direction: column; }
        #chat { flex-grow: 1; overflow-y: auto; border: 1px solid #222; padding: 10px; margin-bottom: 10px; }
        .msg { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .user { background: #222; color: #fff; text-align: right; }
        .ai { background: #111; border-left: 3px solid #ff8c00; }
        .debug { color: #555; font-size: 10px; margin-top: 5px; }
        textarea { width: 100%; background: #000; color: #fff; border: 1px solid #ff8c00; padding: 10px; height: 60px; }
        button { background: #ff8c00; color: #000; border: none; padding: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="chat"></div>
        <textarea id="input" placeholder="Demande du code ici..."></textarea>
        <button onclick="send()">PUSH / DISCUTER</button>
    </div>

    <script>
        let history = [];
        const chat = document.getElementById('chat');

        function addMsg(role, text, debugInfo = "") {
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            div.innerHTML = `<div>${text}</div>${debugInfo ? `<div class="debug">${debugInfo}</div>` : ''}`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function send() {
            const val = document.getElementById('input').value;
            if(!val) return;
            addMsg('user', val);
            document.getElementById('input').value = "";

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ prompt: val, history })
                });
                const data = await res.json();
                
                history.push({ role: "user", parts: [{ text: val }] });
                history.push(data.fullResponse);

                let debug = `Repo: ${data.repo || 'aucun'} | File: ${data.path || 'aucun'}`;
                addMsg('ai', data.text || "...", debug);

                if (data.code && data.path) {
                    addMsg('ai', `🛠️ Tentative de push vers ${data.path}...`);
                    const git = await fetch('/api/github', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(data)
                    });
                    if (git.ok) addMsg('ai', "✅ Code déployé avec succès !");
                    else addMsg('ai', "❌ Erreur lors du déploiement GitHub.");
                }
            } catch (e) {
                addMsg('ai', "Erreur : " + e.message);
            }
        }
    </script>
</body>
</html>
