<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pamplemouche Engine - Collab</title>
    <style>
        body { background: #050505; color: #ff8c00; font-family: sans-serif; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 800px; height: 100vh; display: flex; flex-direction: column; background: #000; }
        #chat { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px; border-radius: 8px; max-width: 80%; font-size: 15px; line-height: 1.4; }
        .user { align-self: flex-end; background: #ff8c00; color: #000; }
        .ai { align-self: flex-start; background: #1a1a1a; color: #ccc; border: 1px solid #333; }
        .status { font-size: 10px; color: #555; padding: 10px; text-align: center; border-top: 1px solid #111; }
        .input-area { padding: 15px; display: flex; gap: 10px; background: #0a0a0a; }
        textarea { flex: 1; background: #161616; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 5px; resize: none; outline: none; height: 40px; }
        button { background: #ff8c00; border: none; padding: 0 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div id="chat">
            <div class="msg ai">Salut ! Prêt à coder ? Dis-moi ce qu'on fait.</div>
        </div>
        <div id="status">Statut : Prêt</div>
        <div class="input-area">
            <textarea id="input" placeholder="Discuter ou coder..."></textarea>
            <button id="send" onclick="send()">PUSH</button>
        </div>
    </div>

    <script>
        let history = [];
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const status = document.getElementById('status');

        function addMsg(role, txt) {
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            div.innerText = txt;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function send() {
            const val = input.value.trim();
            if(!val) return;
            
            addMsg('user', val);
            input.value = '';
            status.innerText = "L'IA réfléchit...";

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ prompt: val, history })
                });
                const data = await res.json();
                
                history.push({ role: "user", parts: [{ text: val }] });
                history.push(data.fullResponse);

                // On affiche 'text' s'il existe, sinon un message par défaut
                addMsg('ai', data.text || "J'ai traité ta demande.");

                if(data.code && data.path) {
                    status.innerText = `Push en cours vers ${data.path}...`;
                    await fetch('/api/github', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            repo: data.repo, path: data.path, content: data.code, 
                            message: data.text, createRepo: data.createRepo
                        })
                    });
                    status.innerText = `✅ Déployé sur ${data.repo}`;
                } else {
                    status.innerText = "Prêt";
                }
            } catch(e) {
                addMsg('ai', "Erreur de connexion.");
            }
        }
    </script>
</body>
</html>
