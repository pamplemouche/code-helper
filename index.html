<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pamplemouche OS - Direct Control</title>
    <style>
        body { background: #050505; color: #ff8c00; font-family: 'Courier New', monospace; padding: 15px; }
        #console { background: #000; border: 1px solid #333; height: 65vh; overflow-y: auto; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        .entry { margin-bottom: 15px; padding: 8px; border-radius: 4px; }
        .user { border-right: 3px solid #ff8c00; background: #111; text-align: right; }
        .ai { border-left: 3px solid #00ffcc; background: #0a0a0a; color: #00ffcc; }
        .tech-info { font-size: 11px; color: #666; margin-top: 5px; font-style: italic; }
        textarea { width: 100%; background: #111; color: #fff; border: 1px solid #ff8c00; padding: 10px; height: 60px; box-sizing: border-box; }
        button { width: 100%; background: #ff8c00; border: none; padding: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:disabled { background: #444; }
    </style>
</head>
<body>
    <div id="console"></div>
    <textarea id="cmd" placeholder="Action (ex: Ajoute 'Passage Gemini' dans le readme de code-helper)"></textarea>
    <button id="btn" onclick="execute()">EXECUTE COMMAND</button>

    <script>
        let history = [];
        const consoleDiv = document.getElementById('console');

        function print(role, text, repo="", path="") {
            const div = document.createElement('div');
            div.className = `entry ${role}`;
            div.innerHTML = `<div>${text}</div>`;
            if(repo) div.innerHTML += `<div class="tech-info">Target: ${repo} > ${path}</div>`;
            consoleDiv.appendChild(div);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }

        async function execute() {
            const prompt = document.getElementById('cmd').value;
            if(!prompt) return;
            
            document.getElementById('btn').disabled = true;
            print('user', prompt);
            document.getElementById('cmd').value = "";

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ prompt, history })
                });
                const data = await res.json();
                
                history.push({ role: "user", parts: [{ text: prompt }] });
                history.push(data.fullResponse);

                print('ai', data.text, data.repo, data.path);

                if (data.code && data.repo && data.repo !== "aucun") {
                    print('ai', "⏳ Push GitHub en cours...");
                    const git = await fetch('/api/github', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(data)
                    });
                    if (git.ok) print('ai', "✅ DEPLOYED SUCCESSFULLY");
                    else print('ai', "❌ GITHUB ERROR");
                }
            } catch (e) {
                print('ai', "SYSTEM CRASH: " + e.message);
            } finally {
                document.getElementById('btn').disabled = false;
            }
        }
    </script>
</body>
</html>
