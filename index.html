<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pamplemouche OS - Collab Mode</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { background: #050505; color: #ccc; font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 900px; height: 100vh; display: flex; flex-direction: column; border-left: 1px solid #222; border-right: 1px solid #222; }
        
        #chat { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        
        .msg { max-width: 90%; line-height: 1.6; font-size: 16px; animation: fadeIn 0.3s ease; }
        .user { align-self: flex-end; background: #222; color: #fff; padding: 12px 18px; border-radius: 15px 15px 2px 15px; border: 1px solid #333; }
        .ai { align-self: flex-start; width: 100%; }
        
        /* Style du Markdown */
        .ai pre { background: #111; padding: 15px; border-radius: 8px; border: 1px solid #333; overflow-x: auto; color: #00ffcc; }
        .ai code { font-family: 'Consolas', monospace; }
        .ai p { margin: 0 0 10px 0; }

        .sync-badge { 
            display: inline-flex; align-items: center; gap: 8px; 
            background: rgba(255, 140, 0, 0.1); color: #ff8c00; 
            padding: 5px 12px; border-radius: 20px; font-size: 12px; 
            font-weight: bold; border: 1px solid #ff8c00; margin-bottom: 10px;
        }

        .input-area { padding: 20px; background: #0a0a0a; border-top: 1px solid #222; }
        .input-wrapper { display: flex; gap: 10px; background: #161616; padding: 10px; border-radius: 12px; border: 1px solid #333; }
        textarea { flex: 1; background: transparent; border: none; color: #fff; resize: none; outline: none; font-size: 16px; height: 50px; padding: 5px; }
        button { background: #ff8c00; border: none; padding: 0 25px; border-radius: 10px; font-weight: bold; cursor: pointer; color: #000; }
        button:disabled { background: #444; color: #888; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container">
        <div id="chat">
            <div class="msg ai">
                <p><b>Pamplemouche Engine v3.0</b></p>
                <p>Mode collaboratif activé. Je peux discuter et modifier tes fichiers GitHub directement dès que je génère du code.</p>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="user-input" placeholder="Dis-moi quoi coder ou rectifier..."></textarea>
                <button id="send-btn" onclick="sendMessage()">ENVOYER</button>
            </div>
        </div>
    </div>

    <script>
        let conversationHistory = [];
        const chatZone = document.getElementById('chat');
        const input = document.getElementById('user-input');

        function addMessage(role, content, isSyncing = false, fileName = "") {
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            
            let html = "";
            if (isSyncing) {
                html += `<div class="sync-badge">🚀 SYNC GITHUB : ${fileName}</div>`;
            }
            
            // On utilise Marked pour transformer le Markdown en HTML
            html += role === 'ai' ? marked.parse(content) : content;
            div.innerHTML = html;
            
            chatZone.appendChild(div);
            chatZone.scrollTop = chatZone.scrollHeight;
        }

        async function sendMessage() {
            const prompt = input.value.trim();
            if (!prompt) return;

            addMessage('user', prompt);
            input.value = '';
            document.getElementById('send-btn').disabled = true;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, history: conversationHistory })
                });

                const data = await response.json();
                
                // On ajoute à l'historique
                conversationHistory.push({ role: "user", parts: [{ text: prompt }] });
                conversationHistory.push(data.fullResponse);

                // Analyse pour voir si l'IA a proposé un fichier
                // On cherche le pattern "Fichier: USER/REPO/PATH"
                const fileMatch = data.text.match(/Fichier:\s*([^\s\n]+)/);
                const codeMatch = data.text.match(/```[a-z]*\n([\s\S]*?)```/);

                if (fileMatch && codeMatch) {
                    const fullPath = fileMatch[1];
                    const code = codeMatch[1];
                    
                    // On affiche le message avec le badge de sync
                    addMessage('ai', data.text, true, fullPath);

                    // Extraction du Repo et du Path
                    const parts = fullPath.split('/');
                    const repo = parts.slice(0, 2).join('/');
                    const path = parts.slice(2).join('/');

                    // Push vers l'API GitHub
                    await fetch('/api/github', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            repo: repo,
                            path: path,
                            content: code,
                            message: `Rectification via Gemini Collab`
                        })
                    });
                } else {
                    // Simple discussion
                    addMessage('ai', data.text);
                }

            } catch (err) {
                console.error(err);
                addMessage('ai', "Erreur de connexion avec l'Engine.");
            } finally {
                document.getElementById('send-btn').disabled = false;
            }
        }

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
