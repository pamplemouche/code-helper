<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pamplemouche Engine v3.0</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { background: #050505; color: #ccc; font-family: sans-serif; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 900px; height: 100vh; display: flex; flex-direction: column; border-left: 1px solid #222; border-right: 1px solid #222; }
        
        #chat { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        
        .msg { max-width: 90%; line-height: 1.6; font-size: 16px; border-radius: 10px; padding: 12px; }
        .user { align-self: flex-end; background: #222; color: #fff; border: 1px solid #333; }
        .ai { align-self: flex-start; width: 100%; color: #eee; }
        
        /* Blocs de code */
        pre { background: #111; padding: 15px; border-radius: 8px; border: 1px solid #333; overflow-x: auto; color: #00ffcc; }
        code { font-family: 'Consolas', monospace; }

        .sync-info { 
            background: rgba(255, 140, 0, 0.1); color: #ff8c00; 
            padding: 8px; border-radius: 5px; font-size: 12px; 
            border: 1px solid #ff8c00; margin-bottom: 10px; display: none;
        }

        .input-area { padding: 20px; background: #0a0a0a; border-top: 1px solid #222; }
        .input-wrapper { display: flex; gap: 10px; background: #161616; padding: 10px; border-radius: 12px; border: 1px solid #333; }
        textarea { flex: 1; background: transparent; border: none; color: #fff; resize: none; outline: none; font-size: 16px; height: 50px; }
        button { background: #ff8c00; border: none; padding: 0 25px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div id="sync-status" class="sync-info"></div>
        <div id="chat">
            <div class="msg ai"><b>Pamplemouche Engine v3.0</b><br>Prêt à collaborer. Discutons et codons !</div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="prompt" placeholder="Action ou discussion..."></textarea>
                <button onclick="send()">ENVOYER</button>
            </div>
        </div>
    </div>

    <script>
        let history = [];
        const chat = document.getElementById('chat');
        const syncStatus = document.getElementById('sync-status');

        function addMsg(role, content) {
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            div.innerHTML = role === 'ai' ? marked.parse(content) : content;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function send() {
            const prompt = document.getElementById('prompt').value.trim();
            if(!prompt) return;

            addMsg('user', prompt);
            document.getElementById('prompt').value = "";

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ prompt, history })
                });
                
                const data = await res.json();
                addMsg('ai', data.text); // Affiche le texte Markdown
                
                history.push({ role: "user", parts: [{ text: prompt }] });
                history.push(data.fullResponse);

                // --- INTERCEPTION DU CODE ---
                // On cherche "Fichier: USER/REPO/PATH" et un bloc de code
                const fileMatch = data.text.match(/Fichier:\s*([^\s\n]+)/);
                const codeMatch = data.text.match(/```[a-z]*\n([\s\S]*?)```/);

                if (fileMatch && codeMatch) {
                    const fullPath = fileMatch[1];
                    const code = codeMatch[1];
                    
                    syncStatus.style.display = "block";
                    syncStatus.innerText = `🚀 Synchronisation de ${fullPath}...`;

                    const parts = fullPath.split('/');
                    const repo = `${parts[0]}/${parts[1]}`;
                    const path = parts.slice(2).join('/');

                    const git = await fetch('/api/github', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ repo, path, content: code, message: "Maj via Collab" })
                    });

                    if(git.ok) syncStatus.innerText = `✅ Déployé : ${fullPath}`;
                    else syncStatus.innerText = `❌ Erreur Push GitHub`;
                    
                    setTimeout(() => { syncStatus.style.display = "none"; }, 3000);
                }

            } catch(e) {
                addMsg('ai', "Erreur de flux : " + e.message);
            }
        }
    </script>
</body>
</html>
