<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pamplemouche OS Master Control</title>
    <style>
        body { background: #050505; color: #ff8c00; font-family: 'Courier New', monospace; padding: 20px; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; display: flex; flex-direction: column; height: 95vh; }
        h1 { border-bottom: 2px solid #ff8c00; padding-bottom: 10px; color: #fff; text-align: center; font-size: 1.5em; text-transform: uppercase; letter-spacing: 2px; }
        
        #terminal { 
            flex-grow: 1; background: #000; border: 1px solid #ff8c00; 
            overflow-y: auto; padding: 15px; margin-bottom: 20px; 
            border-radius: 5px; box-shadow: 0 0 20px rgba(255,140,0,0.1); 
        }

        .input-box { display: flex; gap: 10px; padding-bottom: 10px; }
        textarea { 
            flex: 1; background: #111; border: 1px solid #ff8c00; color: #fff; 
            padding: 15px; border-radius: 5px; font-size: 16px; 
            resize: none; outline: none; transition: 0.3s;
        }
        textarea:focus { box-shadow: 0 0 10px rgba(255,140,0,0.5); }
        
        button { 
            background: #ff8c00; border: none; padding: 0 35px; 
            font-weight: bold; cursor: pointer; border-radius: 5px;
            color: #000; transition: 0.2s; font-size: 1.1em;
        }
        button:hover { background: #fff; transform: scale(1.02); }
        button:disabled { background: #555; cursor: not-allowed; }

        .log-user { color: #fff; margin-top: 15px; font-weight: bold; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .log-ai { color: #00ffcc; margin: 10px 0; border-left: 3px solid #00ffcc; padding-left: 10px; background: rgba(0, 255, 204, 0.05); padding: 10px; border-radius: 0 5px 5px 0; }
        .log-sys { color: #ffae00; font-size: 0.9em; margin: 5px 0; }
        .log-error { color: #ff4444; font-weight: bold; background: rgba(255, 68, 68, 0.1); padding: 10px; border-left: 3px solid #ff4444; }
        
        .code-preview { 
            background: #0a0a0a; color: #0f0; padding: 10px; 
            font-size: 0.85em; border: 1px solid #1a1a1a; 
            margin-top: 10px; white-space: pre-wrap; word-break: break-all;
            max-height: 250px; overflow-y: auto; border-radius: 3px;
            font-family: 'Consolas', 'Monaco', monospace;
        }
        
        b { color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍊 Pamplemouche Engine</h1>
        
        <div id="terminal">
            <div class="log-sys">[System] Engine v2.0 opérationnel. En attente de déploiement universel...</div>
        </div>

        <div class="input-box">
            <textarea id="prompt" placeholder="Ex: Crée un nouveau repo 'my-os' et génère un kernel JS dedans..."></textarea>
            <button id="pushBtn" onclick="run()">PUSH</button>
        </div>
    </div>

    <script>
        let conversationHistory = [];
        const term = document.getElementById('terminal');
        const promptInput = document.getElementById('prompt');
        const btn = document.getElementById('pushBtn');

        function log(msg, type='sys') {
            const div = document.createElement('div');
            div.className = 'log-' + type;
            div.innerHTML = msg;
            term.appendChild(div);
            term.scrollTop = term.scrollHeight;
        }

        async function run() {
            const userPrompt = promptInput.value.trim();
            if(!userPrompt) return;

            // Verrouillage de l'interface
            btn.disabled = true;
            btn.innerText = "...";

            log(`> EXECUTING: ${userPrompt}`, 'user');
            promptInput.value = '';

            try {
                // 1. Envoi à l'API de Chat (Gemini 1.5 Pro)
                log(`🧠 Réflexion de l'IA en cours...`, 'sys');
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        prompt: userPrompt, 
                        history: conversationHistory 
                    })
                });
                
                const data = await res.json();
                
                // Gestion des erreurs de l'IA
                if (data.error || !data.repo) {
                    log(`❌ ERREUR IA: ${data.error || 'Réponse invalide'}`, 'error');
                    return;
                }

                // Mise à jour de la mémoire de l'IA
                if (data.fullResponse) {
                    conversationHistory.push(data.fullResponse);
                }

                // Affichage du résultat de l'IA
                log(`<b>IA (${data.repo})</b>: ${data.explanation}`, 'ai');
                
                if (data.code) {
                    const preview = document.createElement('div');
                    preview.className = 'code-preview';
                    // Sécurité substring pour éviter les crashs
                    preview.innerText = data.code.length > 1000 ? data.code.substring(0, 1000) + "\n... [Code tronqué pour l'affichage]" : data.code;
                    term.appendChild(preview);
                }

                // 2. Déploiement via l'API GitHub
                log(`🚀 Initialisation du déploiement sur <b>${data.repo}</b>...`, 'sys');
                
                const gitRes = await fetch('/api/github', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        repo: data.repo, 
                        path: data.path, 
                        content: data.code, 
                        message: data.explanation,
                        createRepo: data.createRepo || false // Support création repo automatique
                    })
                });

                const gitData = await gitRes.json();

                if (gitRes.ok) {
                    log(`✅ SUCCÈS : Fichier <b>${data.path}</b> synchronisé avec succès.`, 'sys');
                } else {
                    log(`❌ ÉCHEC GITHUB : ${gitData.error || 'Erreur de permission ou de réseau'}`, 'error');
                }

            } catch(e) { 
                log(`❌ CRASH SYSTÈME : ${e.message}`, 'error'); 
                console.error(e);
            } finally {
                btn.disabled = false;
                btn.innerText = "PUSH";
                term.scrollTop = term.scrollHeight;
            }
        }

        // Raccourci clavier pour iPad (Cmd+Enter)
        promptInput.addEventListener('keydown', (e) => {
            if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
                run();
            }
        });
    </script>
</body>
</html>
