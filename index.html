<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Pamplemouche Dev Chat</title>
    <style>
        body { background: #0a0a0a; color: #ff8c00; font-family: 'Courier New', monospace; padding: 20px; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; border: 1px solid #333; border-radius: 8px; box-shadow: 0 0 15px rgba(255,140,0,0.3); display: flex; flex-direction: column; height: calc(100vh - 40px); }
        h1 { border-bottom: 2px solid #ff8c00; padding-bottom: 10px; color: #fff; text-align: center; margin-top: 0; }
        #chat-history { flex-grow: 1; overflow-y: auto; background: #000; padding: 15px; border: 1px dashed #555; border-radius: 5px; margin-bottom: 10px; color: #ccc; font-size: 0.9em; }
        .user-message, .ai-message { margin-bottom: 10px; padding: 8px; border-radius: 5px; }
        .user-message { background: #222; border-left: 3px solid #ff8c00; }
        .ai-message { background: #1a1a1a; border-left: 3px solid #00ff00; }
        .message-role { font-weight: bold; margin-bottom: 5px; color: #fff; }
        .message-text { white-space: pre-wrap; word-break: break-word; }
        .input-area { display: flex; gap: 10px; }
        textarea { 
            flex-grow: 1; height: 60px; /* Plus petit car c'est une zone de chat */
            background: #1a1a1a; color: #fff; 
            border: 1px solid #ff8c00; padding: 10px;
            border-radius: 5px; resize: none;
            box-sizing: border-box; 
        }
        button { 
            background: #ff8c00; color: #0a0a0a; 
            border: none; padding: 12px 25px; 
            font-weight: bold; cursor: pointer; border-radius: 5px;
            font-size: 1em; transition: background-color 0.2s ease;
        }
        button:hover { background: #ffa500; }
        .code-block { 
            background: #000; border: 1px solid #333; padding: 10px; margin: 10px 0; 
            white-space: pre-wrap; word-break: break-all; font-family: 'Fira Code', 'JetBrains Mono', monospace; 
            font-size: 0.85em; max-height: 250px; overflow-y: auto; color: #00ff00;
        }
        #current-code-status { margin-top: 10px; padding: 10px; background: #1a1a1a; border: 1px solid #555; border-radius: 5px; font-size: 0.8em; color: #aaa; }
        #current-code-status .code-file { color: #ff8c00; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍊 PAMPLEMOUCHE-DEV-AI CHAT</h1>
        
        <div id="chat-history">
            <div class="ai-message"><div class="message-role">Pamplemouche-Dev-AI</div><div class="message-text">Bonjour ! Comment puis-je faire évoluer Pamplemouche OS aujourd'hui ?</div></div>
        </div>

        <div class="input-area">
            <textarea id="prompt" placeholder="Ex: Ajoute un bouton 'Démarrer' au fichier ui/desktop.html qui ouvre un menu déroulant..."></textarea>
            <button onclick="executeAICommand()">ENVOYER</button>
        </div>
        
        <div id="current-code-status">
            Dernière mise à jour : <span class="code-file">aucun</span>
        </div>
    </div>

    <script>
        let conversationHistory = []; // Stocke l'historique pour Gemini
        const chatHistoryElement = document.getElementById('chat-history');
        const promptInput = document.getElementById('prompt');
        const currentCodeStatus = document.getElementById('current-code-status');

        function appendMessage(role, text) {
            const messageDiv = document.createElement('div');
            messageDiv.className = role === 'user' ? 'user-message' : 'ai-message';
            messageDiv.innerHTML = `<div class="message-role">${role === 'user' ? 'Moi' : 'Pamplemouche-Dev-AI'}</div><div class="message-text">${escapeHtml(text)}</div>`;
            chatHistoryElement.appendChild(messageDiv);
            chatHistoryElement.scrollTop = chatHistoryElement.scrollHeight; // Scroll vers le bas
        }

        async function executeAICommand() {
            const userPrompt = promptInput.value.trim();
            if (!userPrompt) return;

            // Mot de passe (à ajouter si tu l'as mis en place)
            // const pass = prompt("Entrez le code d'accès Pamplemouche :");
            // if (pass !== "TON_MOT_DE_PASSE_ICI") { 
            //     alert("Accès refusé"); 
            //     return; 
            // }

            appendMessage('user', userPrompt);
            conversationHistory.push({ role: "user", parts: [{ text: userPrompt }] });
            promptInput.value = ''; // Vide la zone de texte

            appendMessage('ai', "🧠 Réflexion de l'IA en cours...");
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: userPrompt, history: conversationHistory }) // Envoie l'historique complet
                });
                
                const data = await response.json();
                
                // Met à jour l'historique avec la réponse de Gemini pour les prochaines requêtes
                conversationHistory.push(data.fullResponse); 

                // Affiche la réponse de Gemini
                const aiResponseDiv = chatHistoryElement.lastChild; // Récupère le message "Réflexion en cours"
                aiResponseDiv.innerHTML = `<div class="message-role">Pamplemouche-Dev-AI</div><div class="message-text">OK. ${escapeHtml(data.explanation)}</div>`;
                if (data.code && data.path !== "error.log") {
                    aiResponseDiv.innerHTML += `<div class="code-block">${escapeHtml(data.code)}</div>`;
                }

                // Si c'est un vrai fichier (pas une erreur de log), on l'envoie à GitHub
                if (data.path && data.path !== "error.log" && data.code) {
                    appendMessage('ai', `🚀 Envoi du patch à GitHub pour <span class="code-file">${data.path}</span>...`);
                    
                    const gitRes = await fetch('/api/github', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            path: data.path, 
                            content: data.code,
                            message: `Pamplemouche-Dev: ${data.explanation}` 
                        })
                    });

                    if (gitRes.ok) {
                        appendMessage('ai', `✅ Succès ! Fichier <span class="code-file">${data.path}</span> mis à jour.`);
                        currentCodeStatus.innerHTML = `Dernière mise à jour : <span class="code-file">${data.path}</span> (${new Date().toLocaleTimeString()})`;
                    } else {
                        const errorGitData = await gitRes.json();
                        appendMessage('ai', `❌ Erreur GitHub: ${errorGitData.message || JSON.stringify(errorGitData)}`, 'error');
                    }
                }

            } catch (err) {
                appendMessage('ai', `❌ ERREUR CRITIQUE: ${err.message}`, 'error');
                console.error("Détails de l'erreur:", err); 
                // Réinitialise l'historique en cas d'erreur grave pour éviter les boucles
                conversationHistory = [];
            }
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
